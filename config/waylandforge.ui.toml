# WaylandForge UI defaults. Runtime changes are written to waylandforge.ui.local.toml.

[ui]
window_mode = "tiled" # tiled | floating | mixed
theme = "dark"
scale = "fit" # fit | integer | stretch
bling = false # opens style effects when enabled
rainbow_borders = true
button_style = "flat" # flat | edge | loud
border_effect = "glow" # still | glow | flow
effect_speed = 1 # 1 slow | 2 calm | 3 active | 4 fast
effect_strength = 1 # 1 subtle | 2 normal | 3 bright | 4 loud
border_thickness = 1

[audio]
volume = 80

[input]
escape = "esc"
up = "up"
down = "down"
left = "left"
right = "right"
start = "enter"
a = "z"
b = "x"
c = "c"
x = "a"
y = "s"
z = "d"
scale_fit = "1"
scale_integer = "2"
scale_stretch = "3"
theme_next = "t"
shift = "leftshift,rightshift"
super = "leftmeta,rightmeta"

[ui.layout]
root = "v(viewport,h(rom_picker,h(settings,h(style_editor,input_mapper,0.50),0.50),0.58),0.62)"

[external_core]
mode = "wfcore_socket" # stdio | wfex_file | wfcore_socket
command = "/home/nichlas/WaylandForge/local/opentyrian-wfcore/opentyrian" # empty + stdio uses the built-in dummy process
args = ""
working_directory = "/home/nichlas/WaylandForge/local/opentyrian-wfcore"
env = "OPENTYRIAN_WFCORE=1;SDL_VIDEODRIVER=dummy"
wfex_path = "/tmp/waylandforge-opentyrian.wfex"
socket_path = "/tmp/waylandforge-wfcore.sock"

[ui.tile]
primary = "viewport"
right_stack = "debug,settings"
bottom_stack = ""
rom_picker = "center" # floating | right | bottom | center

[ui.windows.viewport]
open = true
slot = "center"
order = 0
x = 0
y = 0
width = 980
height = 680

[ui.windows.style_editor]
open = false
slot = "right" # left | right | top | bottom
order = 30
x = 0
y = 0
width = 360
height = 330

[ui.windows.settings]
open = false
slot = "right" # left | right | top | bottom
order = 20
x = 0
y = 0
width = 360
height = 330

[ui.windows.rom_picker]
open = false
slot = "center"
order = 10
x = 0
y = 0
width = 980
height = 680

[ui.windows.input_mapper]
open = false
slot = "right"
order = 40
x = 0
y = 0
width = 420
height = 520
